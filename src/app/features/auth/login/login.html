<div class="min-h-screen bg-slate-900 flex items-center justify-center px-4">
  <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-xl p-8 border border-slate-700">

    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white mb-2">Bienvenido a FinSync</h2>
      <p class="text-slate-400">Inicia sesión para gestionar tus finanzas</p>
    </div>

    @if (errorMessage()) {
    <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-6 text-sm">
      {{ errorMessage() }}
    </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Correo Electrónico</label>
        <input type="email" formControlName="email"
          class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
          placeholder="tu@email.com">
        @if (loginForm.controls.email.touched && loginForm.controls.email.invalid) {
        <p class="mt-1 text-sm text-red-400">Ingresa un correo válido.</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
        <input type="password" formControlName="password"
          class="w-full px-4 py-3 rounded-lg bg-slate-900 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
          placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="isLoading()"
        class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-semibold rounded-lg shadow-md transition-all disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center">

        @if (isLoading()) {
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
          viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>
        Conectando...
        } @else {
        Iniciar Sesión
        }
      </button>

    </form>
    <div class="text-center mt-6">
      <p class="text-slate-400 text-sm">
        ¿Aún no tienes cuenta?
        <a routerLink="/register"
          class="text-blue-400 hover:text-blue-300 font-medium transition-colors cursor-pointer">
          Regístrate aquí
        </a>
      </p>
    </div>
  </div>
</div>
